// Helper: convert ft/in to total inches
function toInches(ft, inch) {
  return parseInt(ft, 10) * 12 + parseInt(inch, 10);
}

// Helper: format inches back to ft'in"
function formatHeight(totalInches) {
  const ft = Math.floor(totalInches / 12);
  const inch = totalInches % 12;
  return `${ft}'${inch}"`;
}

// Build chart evaluator — returns disposition per carrier
function evaluateBuild(heightInches, weight) {
  const results = {};

  // Transamerica
  const t = TRANS_BUILD[heightInches];
  if (!t) {
    results.Transamerica = { status: "decline", note: "Height outside chart (4'8\"-7')." };
  } else if (weight >= t.sLow && weight <= t.sHigh) {
    results.Transamerica = { status: "level", note: `Select range: ${t.sLow}-${t.sHigh} lbs.` };
  } else if ((weight >= t.gLow1 && weight <= t.gHigh1) || (weight >= t.gLow2 && weight <= t.gHigh2)) {
    results.Transamerica = { status: "graded", note: `Graded range: ${t.gLow1}-${t.gHigh1} or ${t.gLow2}-${t.gHigh2} lbs.` };
  } else {
    results.Transamerica = { status: "decline", note: `Outside all bands. Select: ${t.sLow}-${t.sHigh}, Graded edges: ${t.gLow1}-${t.gHigh1} / ${t.gLow2}-${t.gHigh2}.` };
  }

  // Fidelity Life
  const f = FIDELITY_BUILD[heightInches];
  if (!f) {
    results["Fidelity Life"] = { status: "decline", note: "Height outside chart (4'8\"-6'9\")." };
  } else if (weight >= f.min && weight <= f.max) {
    results["Fidelity Life"] = { status: "level", note: `Eligible range: ${f.min}-${f.max} lbs.` };
  } else {
    results["Fidelity Life"] = { status: "decline", note: `Outside ${f.min}-${f.max} lbs. No graded option for Final Expense — route to GI.` };
  }

  // Corebridge
  const c = COREBRIDGE_BUILD[heightInches];
  if (!c) {
    results.Corebridge = { status: "decline", note: "Height outside chart (4'8\"-6'10\")." };
  } else if (weight >= c.mMin && weight <= c.mMax) {
    results.Corebridge = { status: "level", note: `Legacy Max (Level): ${c.mMin}-${c.mMax} lbs. Also qualifies for Legacy (Graded).` };
  } else if (weight >= c.gMin && weight <= c.gMax) {
    results.Corebridge = { status: "graded", note: `Legacy (Graded) only: ${c.gMin}-${c.gMax} lbs. Legacy Max requires ${c.mMin}-${c.mMax}.` };
  } else {
    results.Corebridge = { status: "decline", note: `Outside all bands. Legacy: ${c.gMin}-${c.gMax}, Legacy Max: ${c.mMin}-${c.mMax}.` };
  }

  // Mutual of Omaha — Living Promise has separate Level and Graded max columns
  const m = MOO_BUILD[heightInches];
  if (!m) {
    results["Mutual of Omaha"] = { status: "decline", note: "Height outside chart (4'8\"-6'10\")." };
  } else if (weight < m.min) {
    results["Mutual of Omaha"] = { status: "decline", note: `Below minimum ${m.min} lbs.` };
  } else if (weight <= m.levelMax) {
    results["Mutual of Omaha"] = { status: "level", note: `Living Promise Level Benefit max: ${m.levelMax} lbs. Min: ${m.min}.` };
  } else if (weight <= m.gradedMax) {
    results["Mutual of Omaha"] = { status: "graded", note: `Over Level (${m.levelMax}) but within Graded max (${m.gradedMax}). Build alone routes to Graded.` };
  } else {
    results["Mutual of Omaha"] = { status: "decline", note: `Over Graded max (${m.gradedMax}). Build alone declines for Living Promise.` };
  }

  // Ethos / TruStage — hard limits only (85-450 lbs, 4'8"-7')
  if (heightInches < 56 || heightInches > 84) {
    results["Ethos / TruStage"] = { status: "decline", note: "Outside 4'8\"-7' height range — hard knockout." };
  } else if (weight < 85 || weight > 450) {
    results["Ethos / TruStage"] = { status: "decline", note: "Outside 85-450 lbs — hard knockout for TAWL/Term. GAWL still available." };
  } else {
    results["Ethos / TruStage"] = { status: "review", note: "Within 85-450 lbs / 4'8\"-7'. Final decision based on health + database lookup." };
  }

  return results;
}

                    value={medQuery}
                    onChange={(e) => setMedQuery(e.target.value)}
                    placeholder="Eliquis, Aricept, Suboxone, Keytruda..."
                    className="w-full bg-slate-950 border border-slate-800 px-5 py-4 text-lg display font-medium focus:outline-none focus:border-cyan-400 transition-colors text-slate-100"
                  />
                </div>

                <div className="mb-6 p-3 border border-cyan-500/20 bg-cyan-500/5 flex items-start gap-3">
                  <div className="text-cyan-400 mono text-xs mt-0.5">✓</div>
                  <div className="text-xs text-cyan-200/80 leading-relaxed">
                    <span className="font-bold">{MEDICATIONS_DB.length} medications loaded</span> from Transamerica precluded drug list, Mutual of Omaha Living Promise medication list, and Corebridge medication impact list. TruStage uses 7-year database lookback — most decline meds inferred from underlying condition rules.
                  </div>
                </div>

                {!medQuery && (
                  <>
                    <div className="text-[10px] tracking-[0.3em] text-slate-500 uppercase mono mb-3">Common Decline Drugs</div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                      {["Aricept", "Suboxone", "Keytruda", "Eliquis", "Entresto", "Daliresp", "Lupron", "Prograf"].map((m) => (
                        <button
                          key={m}
                          onClick={() => setMedQuery(m)}
                          className="text-left border border-slate-800 bg-slate-950/40 p-3 hover:border-cyan-500/40 hover:bg-slate-900/40 transition-all"
                        >
                          <div className="display font-semibold text-sm text-slate-200">{m}</div>
                        </button>
                      ))}
                    </div>
                  </>
                )}

                {medQuery && medMatches.length === 0 && (
                  <div className="border border-dashed border-slate-800 py-16 text-center">
                    <div className="display font-black text-2xl text-slate-700 tracking-wider mb-2">NOT IN DATABASE</div>
                    <div className="text-xs text-slate-600 max-w-md mx-auto">Drug not on uploaded preclusion lists. Check the carrier UW guide directly or contact underwriting.</div>
                  </div>
                )}

                {medQuery && medMatches.length > 0 && (
                  <div className="space-y-4">
                    {medMatches.map((m, i) => (
                      <div key={i} className="border border-slate-800 bg-slate-950/40 p-5">
                        <div className="flex items-baseline gap-3 flex-wrap mb-1">
                          <div className="display font-bold text-2xl text-cyan-400 tracking-wide">{m.name.toUpperCase()}</div>
                          <div className="text-slate-500 text-sm">({m.generic})</div>
                        </div>
                        <div className="text-xs tracking-wide text-slate-400 mb-4">Typically prescribed for: <span className="text-slate-200">{m.condition}</span></div>

                        <div className="space-y-2">
                          {Object.entries(m.carriers).map(([carrier, status]) => {
                            const meta = STATUS_META[status];
                            return (
                              <div key={carrier} className={`border ${meta.border} ${meta.bg} p-3 flex items-center gap-4`}>
                                <div className="display font-bold text-base text-slate-100 tracking-wide w-44 shrink-0">{carrier.toUpperCase()}</div>
                                <div className={`display font-bold text-[10px] tracking-[0.2em] ${meta.color}`}>{meta.label}</div>
                              </div>
                            );
                          })}
                          {!m.carriers["Fidelity Life"] && (
                            <div className="border border-slate-800/60 bg-slate-900/20 p-3 flex items-center gap-4">
                              <div className="display font-bold text-base text-slate-500 tracking-wide w-44 shrink-0">FIDELITY LIFE</div>
                              <div className="display font-bold text-[10px] tracking-[0.2em] text-slate-500">— UW DRIVEN —</div>
                              <div className="text-xs text-slate-500">Not on a published list. Tied to underlying condition.</div>
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}

            {tab === "build" && (
              <>
                <div className="grid grid-cols-1 md:grid-cols-12 gap-3 mb-6">
                  <div className="md:col-span-3">
                    <div className="text-[10px] tracking-[0.3em] text-slate-500 uppercase mono mb-2">Height (Feet)</div>
                    <input
                      type="number"
                      value={heightFt}
                      onChange={(e) => setHeightFt(e.target.value)}
                      placeholder="5"
                      min="3" max="7"
                      className="w-full bg-slate-950 border border-slate-800 px-4 py-3 text-2xl font-bold display focus:outline-none focus:border-cyan-400 transition-colors text-slate-100"
                    />
                  </div>
                  <div className="md:col-span-3">
                    <div className="text-[10px] tracking-[0.3em] text-slate-500 uppercase mono mb-2">Height (Inches)</div>
                    <input
                      type="number"
                      value={heightIn}
                      onChange={(e) => setHeightIn(e.target.value)}
                      placeholder="8"
                      min="0" max="11"
                      className="w-full bg-slate-950 border border-slate-800 px-4 py-3 text-2xl font-bold display focus:outline-none focus:border-cyan-400 transition-colors text-slate-100"
                    />
                  </div>
                  <div className="md:col-span-6">
                    <div className="text-[10px] tracking-[0.3em] text-slate-500 uppercase mono mb-2">Weight (lbs)</div>
                    <input
                      type="number"
                      value={weight}
                      onChange={(e) => setWeight(e.target.value)}
                      placeholder="180"
                      className="w-full bg-slate-950 border border-slate-800 px-4 py-3 text-2xl font-bold display focus:outline-none focus:border-cyan-400 transition-colors text-slate-100"
                    />
                  </div>
                </div>

                <div className="mb-6 p-3 border border-cyan-500/20 bg-cyan-500/5 flex items-start gap-3">
                  <div className="text-cyan-400 mono text-xs mt-0.5">✓</div>
                  <div className="text-xs text-cyan-200/80 leading-relaxed">
                    <span className="font-bold">All 5 build charts loaded.</span> Transamerica uses BMI bands. Corebridge has 2 tiers (Legacy Max stricter than Legacy). Fidelity Life uses single min/max. MOO has separate Level/Graded max. TruStage uses hard limits (85-450 lbs, 4'8"-7').
                  </div>
                </div>

                {!buildResult && (
                  <div className="border border-dashed border-slate-800 py-20 text-center">
                    <div className="display font-black text-3xl text-slate-700 tracking-wider">ENTER HEIGHT & WEIGHT</div>
                    <div className="text-[10px] tracking-[0.4em] text-slate-700 uppercase mt-2 mono">to evaluate all carriers</div>
                  </div>
                )}

                {buildResult && (
                  <>
                    <div className="flex items-baseline justify-between mb-4">
                      <div className="text-[10px] tracking-[0.3em] text-slate-500 uppercase mono">▸ Build Evaluation</div>
                      <div className="text-[10px] tracking-[0.3em] text-cyan-400 uppercase mono">
                        {formatHeight(buildResult.totalInches)} · {buildResult.weight} lbs
                      </div>
                    </div>

                    <div className="space-y-2">
                      {Object.entries(buildResult.results).map(([carrier, info], i) => {
                        const meta = STATUS_META[info.status];
                        return (
                          <div
                            key={carrier}
                            className={`stagger-${Math.min(i + 1, 6)} border ${meta.border} ${meta.bg} p-4`}
                          >
                            <div className="flex items-start gap-4 flex-wrap">
                              <div className="display font-bold text-lg text-slate-100 tracking-wide w-44 shrink-0">{carrier.toUpperCase()}</div>
                              <div className={`display font-bold text-[10px] tracking-[0.2em] ${meta.color} w-20 shrink-0 pt-1.5`}>{meta.label}</div>
                              <div className="text-xs text-slate-300 leading-relaxed flex-1 min-w-[200px] pt-1">{info.note}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div className="mt-8 pt-6 border-t border-slate-900">
                      <div className="text-[10px] tracking-[0.3em] text-slate-500 uppercase mono mb-3">▸ Notes for Agents</div>
                      <div className="text-xs text-slate-400 leading-relaxed space-y-2">
                        <div>• <span className="text-slate-200">Transamerica</span> uses BMI logic — graded weight bands sit just above and below the Select range.</div>
                        <div>• <span className="text-slate-200">Corebridge</span> Legacy Max requires tighter build than Legacy. If client falls in the gap, route to Legacy (graded) instead.</div>
                        <div>• <span className="text-slate-200">Fidelity Life</span> Final Expense has no graded for build — outside the range means GI.</div>
                        <div>• <span className="text-slate-200">Mutual of Omaha</span> Living Promise has separate Level and Graded max columns. Build between Level max and Graded max routes to Graded plan. Multiple impairments tighten this further.</div>
                        <div>• <span className="text-slate-200">Ethos / TruStage</span> hard limits only — within range still requires UW review.</div>
                      </div>
                    </div>
                  </>
                )}
              </>
            )}

            <div className="mt-16 pt-6 border-t border-slate-900 flex justify-between items-center">
              <div className="text-[9px] tracking-[0.4em] text-slate-700 uppercase mono">Black Wing Ventures · Internal</div>
              <div className="text-[9px] tracking-[0.4em] text-slate-700 uppercase mono">Verify w/ Carrier UW Guide</div>
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(BlackWingQuoter));
document.getElementById('loader').style.display = 'none';
</script>
</body>
</html>
